services:
  khipuchat:
    build: .
    volumes:
      - db-data:/app/telegram.db
    env_file: .env
    ports:
      - "127.0.0.1:3333:3333"

volumes:
  db-data:

# ── Environment variable reference ────────────────────────────────────────────
# Copy .env.example to .env and fill in the values you need.
#
# Telegram (required for Telegram sync):
#   TELEGRAM_API_ID=
#   TELEGRAM_API_HASH=
#   TELEGRAM_SESSION=
#
# Discord (optional):
#   DISCORD_TOKEN=
#
# Slack (optional):
#   SLACK_USER_TOKEN=
#
# Email / IMAP (optional):
#   EMAIL_IMAP_HOST=
#   EMAIL_IMAP_USER=
#   EMAIL_IMAP_PASS=
#
# WeChat (optional — macOS only, set path to WeChat container):
#   WECHAT_CONTAINER=
#
# WhatsApp (optional — path for LocalAuth session data):
#   WHATSAPP_SESSION=
#
# Security layers (all optional):
#   DB_KEY=          # SQLCipher key for at-rest DB encryption
#   WEB_USER=        # HTTP Basic Auth username for web UI
#   WEB_PASS=        # HTTP Basic Auth password for web UI
#   MCP_SECRET=      # Bearer token required for MCP tool calls
